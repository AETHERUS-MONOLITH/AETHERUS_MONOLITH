name: Deploy Pages with runtime config

on:
  workflow_dispatch:

permissions:
  contents: read
  actions: read
  pages: write
  id-token: write

concurrency:
  group: github-pages-governable-v0-1
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Verify fixed requester and first attempt
        env:
          EXPECTED_ACTOR: AETHERUS-MONOLITH
          EXPECTED_ACTOR_ID: "264210171"
          ACTOR: ${{ github.actor }}
          ACTOR_ID: ${{ github.actor_id }}
          TRIGGERING_ACTOR: ${{ github.triggering_actor }}
          RUN_ATTEMPT: ${{ github.run_attempt }}
        run: |
          test "$ACTOR" = "$EXPECTED_ACTOR"
          test "$ACTOR_ID" = "$EXPECTED_ACTOR_ID"
          test "$ACTOR" = "$TRIGGERING_ACTOR"
          test "$RUN_ATTEMPT" = "1"

      - name: Checkout exact triggering commit
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          ref: ${{ github.sha }}
          persist-credentials: false

      - name: Verify repository, ref, workflow, and run
        run: |
          test "$GITHUB_REPOSITORY" = "AETHERUS-MONOLITH/AETHERUS_MONOLITH"
          test "$GITHUB_REPOSITORY_ID" = "1167751543"
          test "$GITHUB_REPOSITORY_OWNER_ID" = "264210171"
          test "$GITHUB_REF" = "refs/heads/main"
          test "$GITHUB_WORKFLOW" = "Deploy Pages with runtime config"
          test "$GITHUB_EVENT_NAME" = "workflow_dispatch"
          test "$(git rev-parse HEAD)" = "$GITHUB_SHA"
          test -z "$(git status --porcelain --untracked-files=no)"

      - name: Configure Pages immutably
        uses: actions/configure-pages@983d7736d9b0ae728b81ab479565c72886d7745b

      - name: Stage deterministic static site
        run: |
          mkdir -p _site
          git archive --format=tar "$GITHUB_SHA" | tar -x -C _site

      - name: Generate runtime public config
        env:
          AETHERUS_SUPABASE_URL: ${{ vars.AETHERUS_SUPABASE_URL }}
          AETHERUS_SUPABASE_PUBLISHABLE_KEY: ${{ vars.AETHERUS_SUPABASE_PUBLISHABLE_KEY }}
        run: |
          node --input-type=module <<'NODE'
          import fs from "node:fs/promises";
          const names = ["AETHERUS_SUPABASE_URL", "AETHERUS_SUPABASE_PUBLISHABLE_KEY"];
          for (const name of names) if (!process.env[name]) throw new Error(`Missing required GitHub Actions repository variable: ${name}`);
          const publicConfig = {
            SUPABASE_URL: process.env.AETHERUS_SUPABASE_URL,
            SUPABASE_PUBLISHABLE_KEY: process.env.AETHERUS_SUPABASE_PUBLISHABLE_KEY
          };
          await fs.mkdir("_site/js", { recursive: true });
          await fs.writeFile("_site/js/aetherus-runtime-config.js", `globalThis.AETHERUS_SUPABASE_PUBLIC_CONFIG = ${JSON.stringify(publicConfig)};\n`);
          NODE

      - name: Construct checkout, runtime, and built-artifact evidence
        env:
          AETHERUS_SUPABASE_URL: ${{ vars.AETHERUS_SUPABASE_URL }}
          AETHERUS_SUPABASE_PUBLISHABLE_KEY: ${{ vars.AETHERUS_SUPABASE_PUBLISHABLE_KEY }}
          GITHUB_WORKFLOW_SHA: ${{ github.workflow_sha }}
        run: |
          node scripts/build-github-pages-deployment-evidence.mjs source
          node scripts/build-github-pages-deployment-evidence.mjs artifact

      - name: Acquire fixed-audience GitHub OIDC token
        env:
          OIDC_AUDIENCE: https://hdakjutdomuvyiohxzeb.supabase.co/functions/v1/github-pages-operator-resolution-v0
        run: |
          node --input-type=module <<'NODE'
          import fs from "node:fs/promises";
          const url = new URL(process.env.ACTIONS_ID_TOKEN_REQUEST_URL);
          url.searchParams.set("audience", process.env.OIDC_AUDIENCE);
          const response = await fetch(url, { headers: { authorization: `Bearer ${process.env.ACTIONS_ID_TOKEN_REQUEST_TOKEN}` }, redirect: "error" });
          if (!response.ok) throw new Error(`OIDC acquisition failed: ${response.status}`);
          const payload = await response.json();
          if (typeof payload.value !== "string" || !payload.value) throw new Error("OIDC response missing token");
          await fs.writeFile(`${process.env.RUNNER_TEMP}/github-pages-oidc-token`, payload.value, { mode: 0o600 });
          NODE

      - name: Request fixed Operator resolution
        env:
          EDGE_FUNCTION_URL: https://hdakjutdomuvyiohxzeb.supabase.co/functions/v1/github-pages-operator-resolution-v0
          WORKSPACE_ID: 9abed891-7950-4937-a2aa-4b957d8a4bd1
          WORKFLOW_SHA: ${{ github.workflow_sha }}
        run: |
          node --input-type=module <<'NODE'
          import fs from "node:fs/promises";
          const token = await fs.readFile(`${process.env.RUNNER_TEMP}/github-pages-oidc-token`, "utf8");
          const body = { classification: "production_action", repository: process.env.GITHUB_REPOSITORY, ref: process.env.GITHUB_REF, run_id: process.env.GITHUB_RUN_ID, workflow_sha: process.env.WORKFLOW_SHA, workspace_id: process.env.WORKSPACE_ID };
          const response = await fetch(process.env.EDGE_FUNCTION_URL, { method: "POST", headers: { authorization: `Bearer ${token}`, "content-type": "application/json" }, body: JSON.stringify(body), redirect: "error" });
          if (!response.ok) throw new Error(`Operator resolution failed: ${response.status}`);
          await fs.writeFile(`${process.env.RUNNER_TEMP}/operator-resolution.json`, await response.text(), { mode: 0o600 });
          NODE

      - name: Validate bounded Operator-resolution evidence
        env:
          OPERATOR_RESPONSE_PATH: ${{ runner.temp }}/operator-resolution.json
        run: node scripts/build-github-pages-deployment-evidence.mjs operator

      - name: Construct final action manifest
        run: node scripts/build-github-pages-deployment-evidence.mjs manifest

      - name: Validate complete action boundary
        run: node scripts/validate-github-pages-governable-deployment-action.mjs

      - name: Upload exact Pages artifact
        id: upload_pages_artifact
        uses: actions/upload-pages-artifact@56afc609e74202658d3ffba0e8f6dda462b719fa
        with:
          name: github-pages-governable-v0-1
          path: _site

      - name: Verify current-run artifact identity
        env:
          GITHUB_TOKEN: ${{ github.token }}
          UPLOADED_ARTIFACT_ID: ${{ steps.upload_pages_artifact.outputs.artifact_id }}
        run: node scripts/verify-github-pages-uploaded-artifact.mjs

      - name: Construct structural pre-deployment permit
        run: node scripts/execute-github-pages-deployment-boundary.mjs

      - name: Deploy the bound Pages artifact
        id: deployment
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e
        with:
          artifact_name: github-pages-governable-v0-1

      - name: Construct result evidence
        env:
          PAGE_URL: ${{ steps.deployment.outputs.page_url }}
        run: |
          node --input-type=module <<'NODE'
          import fs from "node:fs/promises";
          const directory = `${process.env.RUNNER_TEMP}/github-pages-governable-evidence`;
          const permit = JSON.parse(await fs.readFile(`${directory}/structural-permit.json`, "utf8"));
          await fs.writeFile(`${directory}/deployment-result.json`, `${JSON.stringify({ classification: "pages_deployment_result_evidence", structural_permit_sha256: permit.structural_permit_sha256, page_url: process.env.PAGE_URL }, null, 2)}\n`, { mode: 0o600 });
          NODE
